// launch options: -high -nojoy -threads 16 -freq 165 -refresh 165 +exec autoexec -novid -fullscreen -w 1920 -h 1440 -language english -panorama -processheap -noforcemparms -noforcemaccel -tickrate 128 -nod3d9ex -noaafonts +mat_queue_mode 2 +mat_vignette_enable 0

con_filter_text "Damage Given To"
con_filter_text_out "Player:"
con_filter_enable 2
developer 1

cl_color 3 // blue

alias +knife "slot3"
alias -knife "slot2; slot1"
bind q "+knife"

alias +jumpthrow "+jump;-attack"
alias -jumpthrow "-jump"
bind j +jumpthrow

bind "E" "+radar"
alias "+radar" "+use; cl_radar_always_centered 1; cl_radar_scale 0.7"
alias "-radar" "-use; cl_radar_always_centered 0; cl_radar_scale 0.4"

cl_cmdrate 128
cl_updaterate 128
rate 128000

+graph
+cl_show_team_equipment
mm_dedicated_search_maxping "80"
closeonbuy "0"
cl_interp "0"
cl_interp_ratio "1"
cl_radar_scale 0.4
cl_lagcompensation 1
cl_radar_always_centered 0
cl_disablefreezecam 1
zoom_sensitivity_ratio_mouse 1
cl_timeout 1337

alias clutch clutchon
alias clutchon  "voice_enable 0; clutchsoundon; gameinstructor_enable 1; cl_clearhinthistory; r_cleardecals; playvol buttons\blip2 0.5; alias clutch clutchoff"
alias clutchoff "voice_enable 1; clutchsoundoff; gameinstructor_enable 0; playvol buttons\blip1 0.5; alias clutch clutchon"
alias clutchsoundon "snd_deathcamera_volume 0; snd_mapobjective_volume 0; snd_roundend_volume 0; snd_roundstart_volume 0; snd_menumusic_volume 0.032533; snd_mvp_volume 0.299384; snd_tensecondwarning_volume 0.182502"
alias clutchsoundoff "snd_deathcamera_volume 0; snd_mapobjective_volume 0; snd_roundend_volume 0; snd_roundstart_volume 0; snd_menumusic_volume 0.032533; snd_mvp_volume 0.299384; snd_tensecondwarning_volume 0.182502"
clutchoff
bind mouse4 clutch

alias bhop bhopon
alias bhopon  "bind mwheeldown +jump; unbind mwheelup;         playvol buttons\blip2 0.5; alias bhop bhopoff"
alias bhopoff "bind mwheeldown invnext; bind mwheelup invprev; playvol buttons\blip1 0.5; alias bhop bhopon"
bind pgdn bhop

viewmodel_offset_z "-1.5"
viewmodel_offset_x "2.5"
viewmodel_offset_y "1.5"
viewmodel_fov "65"
cl_bob_lower_amt "0"
cl_bobamt_lat "0"
cl_bobamt_vert "0"
cl_bobcycle "0.98"
cl_viewmodel_shift_left_amt "0"
cl_viewmodel_shift_right_amt "0"


cl_disablehtmlmotd "0"
cl_forcepreload "1"
fps_max "0"
fps_max_menu "0"
mat_queue_mode "2"
r_dynamic "1"
r_drawtracers_firstperson "1"
r_eyegloss "0"
r_eyemove "0"
r_eyeshift_x "0"
r_eyeshift_y "0"
r_eyeshift_z "0"
r_eyesize "0"

snd_mixahead "0.05"
snd_headphone_pan_exponent 2

bind ö increment cl_radar_scale 0.25 1.0 -0.05
bind ä increment cl_radar_scale 0.25 1.0 0.05
cl_radar_always_centered

bind "kp_ins" "buy vest;"
bind "kp_del" "buy vesthelm;"
bind "kp_enter" "buy defuser;"
bind "kp_minus" "buy smokegrenade;"
bind "kp_plus" "buy flashbang;"
bind "kp_multiply" "buy hegrenade;"
bind "-" "buy molotov; buy incgrenade;"
bind "kp_end" "buy p250;"
bind "kp_downarrow" "buy tec9; buy fiveseven;"
bind "kp_pgdn" "buy deagle;"
bind "kp_5" "buy ak47; buy m4a1;"
bind "kp_leftarrow" "buy galilar; buy famas;"
bind "kp_rightarrow" "buy sg556; buy aug;"
bind "kp_home" "buy ssg08;"
bind "kp_uparrow" "buy awp;"
bind "kp_pgup" "buy g3sg1; buy scar20;"

bind v +voicerecord

alias "casual" "game_type 0; game_mode 0"
alias "competitive" "game_type 0; game_mode 1"
alias "wingman" "game_type 0; game_mode 2; exec gamemode_competitive2v2; mp_ignore_round_win_conditions 0"
alias "armsrace" "game_type 1; game_mode 0"
alias "demolition" "game_type 1; game_mode 1"
alias "deathmatch" "game_type 1; game_mode 2"
alias "custom" "game_type 3; game_mode 0"

alias "showcrosshair" "developer 2; con_filter_enable 1; con_filter_text cl_crosshair; host_writeconfig; con_filter_text cl_fix; host_writeconfig; con_filter_text "Damage Given To"; con_filter_text_out "Player:"; con_filter_enable 2; developer 1"
alias "showviewmodel" "developer 2; con_filter_enable 1; con_filter_text viewmodel; host_writeconfig; con_filter_text cl_bob; host_writeconfig; con_filter_text "Damage Given To"; con_filter_text_out "Player:"; con_filter_enable 2; developer 1"

alias crosshair "cl_crosshair_drawoutline 1; cl_crosshair_dynamic_maxdist_splitratio 0.2; cl_crosshair_dynamic_splitalpha_innermod 1; cl_crosshair_dynamic_splitalpha_outermod 0.6; cl_crosshair_dynamic_splitdist 2; cl_crosshair_outlinethickness 1; cl_crosshair_sniper_show_normal_inaccuracy 0; cl_crosshair_sniper_width 1; cl_crosshair_t 0; cl_crosshairalpha 255; cl_crosshaircolor 1; cl_crosshaircolor_b 0; cl_crosshaircolor_g 0; cl_crosshaircolor_r 256; cl_crosshairdot 0; cl_crosshairgap -2; cl_crosshairgap_useweaponvalue 0; cl_crosshairscale 0; cl_crosshairsize 1.5; cl_crosshairstyle 2; cl_crosshairthickness 0; cl_crosshairusealpha 1; cl_fixedcrosshairgap 3"

alias nadecrosshair "cl_crosshair_drawoutline 1; cl_crosshair_dynamic_maxdist_splitratio 0.35; cl_crosshair_dynamic_splitalpha_innermod 1; cl_crosshair_dynamic_splitalpha_outermod 0.5; cl_crosshair_dynamic_splitdist 7; cl_crosshair_outlinethickness 1; cl_crosshair_sniper_show_normal_inaccuracy 0; cl_crosshair_sniper_width 1; cl_crosshair_t 0; cl_crosshairalpha 999; cl_crosshaircolor 1; cl_crosshaircolor_b 0; cl_crosshaircolor_g 0; cl_crosshaircolor_r 0; cl_crosshairdot 1; cl_crosshairgap 23.5; cl_crosshairgap_useweaponvalue 0; cl_crosshairscale 0; cl_crosshairsize 300; cl_crosshairstyle 4; cl_crosshairthickness 1.5; cl_crosshairusealpha 1; cl_fixedcrosshairgap -7"

bind "h" "+nadecrosshair"
alias "+nadecrosshair" nadecrosshair
alias "-nadecrosshair" crosshair



bind pgup "say nt"

cl_join_advertise 2

lobby_default_privacy_bits1 0

bind tab "+score; +cl_show_team_equipment"

host_writeconfig
